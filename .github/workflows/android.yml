name: Android CI

on:
  push:
    branches: [ main, ui/redesign ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Build with Gradle
      working-directory: android
      run: ./gradlew build
      
    - name: Run unit tests
      working-directory: android
      run: ./gradlew testDebugUnitTest
